name: CI

on:
  push:
    branches: ["**"]
    paths-ignore: ["**.md", "docs/**", "LICENSE", ".gitignore"]
  pull_request:
    paths-ignore: ["**.md", "docs/**", "LICENSE", ".gitignore"]

# Standalone build (hybrid CI): fm-robot builds its own packages plus the two
# externals it genuinely consumes — openarm_description (xacro) and the
# unitree_ros2 message packages (fm_control depends on unitree_hg + unitree_api).
# Every other external is file-vendored or reference-only and is COLCON_IGNORE'd.
# unitree_ros (G1) and so_arm (SO101) are file-vendored into fm_description's
# share at build, so they must be imported even though they are not built — the
# fm_description description smoke test launches every robot and variant against
# that vendored share. The full multi-repo integration build lives in fm-ros2.
jobs:
  selftest:
    name: bootstrap self-test (curl|bash FM_SELFTEST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # install.sh and run.sh are curl|bash-able. Run each from an empty dir so it
      # takes its network branch — the piped path real users hit — fetching lib.sh
      # from the pinned fm-tools tag. FM_SELFTEST stops each script after deps load
      # and OS/backend resolve, before any OrbStack install, build, or launch.
      - name: install.sh + run.sh load lib + resolve over piped curl
        run: |
          set -euo pipefail
          repo="$PWD"
          cd "$(mktemp -d)"
          for s in install.sh run.sh; do
            echo "== $s =="
            out="$(cat "$repo/$s" | FM_SELFTEST=1 bash 2>&1)" \
              || { echo "$out"; echo "FAIL: $s exited non-zero under curl|bash"; exit 1; }
            echo "$out"
            echo "$out" | grep -q "selftest ok" \
              || { echo "FAIL: $s did not reach 'selftest ok'"; exit 1; }
          done
          echo "bootstrap self-test OK"

  build-test:
    name: build + test (humble)
    runs-on: ubuntu-latest
    container: ros:humble
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          path: src/fm-robot

      - name: Import + mark externals
        run: |
          apt-get update && apt-get install -y python3-vcstool
          vcs import < src/fm-robot/fm-robot.repos
          # Keep only the ament packages we build; ignore the rest.
          for d in external/*/; do touch "${d}COLCON_IGNORE"; done
          rm -f external/openarm_description/COLCON_IGNORE external/unitree_ros2/COLCON_IGNORE
          # unitree_ros2/example/src is the C++ DDS demo set — not needed here.
          [ -d external/unitree_ros2/example/src ] && \
            touch external/unitree_ros2/example/src/COLCON_IGNORE || true

      - name: Install ROS deps
        run: |
          source /opt/ros/humble/setup.bash
          # The Unitree message packages need the DDS IDL generator + CycloneDDS.
          apt-get install -y \
            ros-humble-rosidl-generator-dds-idl \
            ros-humble-cyclonedds ros-humble-rmw-cyclonedds-cpp
          rosdep update
          rosdep install --from-paths src external --ignore-src -y -r

      - name: colcon build
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install

      - name: colcon test
        run: |
          source /opt/ros/humble/setup.bash
          # Test only our packages — the built externals carry their own (upstream) tests.
          colcon test --packages-select $(colcon list --names-only | grep '^fm_')
          colcon test-result --verbose

  image:
    name: build + publish image (FROM fm-docker base)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      # Log in to GHCR — to pull the private base FROM and to push this layer.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build multi-arch (arm64 + amd64). Publish to GHCR only on main — branch and
      # PR runs build to validate without pushing. Downstream repos (fm-sim,
      # fm-teleop, fm-app) pull this as their FROM base, so the GHCR package must be
      # set public once it first publishes.
      - name: Build + publish the robot image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/first-motive/fm-robot:humble
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke:
    name: smoke run.sh (native headless)
    runs-on: ubuntu-latest
    container: ros:humble
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7

      - name: Install tooling + ROS deps
        run: |
          apt-get update && apt-get install -y python3-vcstool
          source /opt/ros/humble/setup.bash
          vcs import < fm-robot.repos
          # Build only the ament packages; ignore the file-vendored externals.
          for d in external/*/; do touch "${d}COLCON_IGNORE"; done
          rm -f external/openarm_description/COLCON_IGNORE external/unitree_ros2/COLCON_IGNORE
          [ -d external/unitree_ros2/example/src ] && \
            touch external/unitree_ros2/example/src/COLCON_IGNORE || true
          apt-get install -y \
            ros-humble-rosidl-generator-dds-idl \
            ros-humble-cyclonedds ros-humble-rmw-cyclonedds-cpp
          rosdep update
          rosdep install --from-paths . external --ignore-src -y -r

      - name: Build workspace
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install

      - name: Launch headless, bounded
        run: |
          # Workspace pre-built above, so run.sh's incremental build is quick and the
          # bounded window covers the launch itself. 124 = ran the full window (came
          # up OK); 0 = clean exit. Anything else is a real failure.
          set +e
          timeout 90 ./run.sh --native --robot g1_d use_rviz:=false use_foxglove:=false
          code=$?
          [ "$code" -eq 124 ] || [ "$code" -eq 0 ] || [ "$code" -eq 143 ]
